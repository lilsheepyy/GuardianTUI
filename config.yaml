whitelist: []
blocked_user_agents:
    - CensysInspect
    - zgrab
    - shodan
    - masscan
    - nmap
    - Nessus
    - Go-http-client
    - python-requests
    - python-urllib
    - curl
    - wget
    - libwww-perl
    - PHP/
    - aiohttp
    - AhrefsBot
    - SemrushBot
    - DotBot
    - Rogerbot
    - MJ12bot
    - MegaIndex.ru
    - BLEXBot
    - PetalBot
honeypot_paths:
    - /.env
    - /.env.local
    - /.env.production
    - /.git/config
    - /.git/HEAD
    - /.ssh/id_rsa
    - /.aws/credentials
    - /.aws/config
    - /.docker/config.json
    - /.npmrc
    - /wp-admin
    - /wp-login.php
    - /wp-config.php
    - /phpmyadmin
    - /admin/phpmyadmin
    - /pma/
    - /administrator/
    - /backend/index.php
    - /joomla/
    - /config.php
    - /web.config
    - /appsettings.json
    - /composer.json
    - /package.json
    - /Dockerfile
    - /docker-compose.yml
    - /server-status
    - /phpinfo.php
    - /backup.sql
    - /db.sql
    - /dump.sql
    - /backup.zip
    - /site.bak
    - /archive.tar
    - /database.sqlite
    - /latest/meta-data/
    - /.kube/config
    - /kibana/
    - /jenkins/
    - /actuator/health
    - /api/v1/debug
blocklist_path: blocklist.txt
remote_blocklists:
    - https://raw.githubusercontent.com/firehol/blocklist-ipsets/refs/heads/master/sslproxies_7d.ipset
    - https://raw.githubusercontent.com/firehol/blocklist-ipsets/refs/heads/master/firehol_proxies.netset
    - https://www.spamhaus.org/drop/drop.txt
    - https://raw.githubusercontent.com/borestad/blocklist-abuseipdb/main/abuseipdb-s100-1d.ipv4
ai_protection:
    endpoints:
        - /v1/chat
        - /api/ai
        - /generate
    protect_pii: true
    blocked_keywords:
        - internal_key
        - admin_password
    score_threshold: 5
engine:
    max_scan_size_bytes: 1048576
    probing_window_seconds: 60
    probing_threshold_unique: 3
    spam_threshold_total: 5
    pow_enabled: false
    pow_difficulty: 0
telemetry_enabled: true
telemetry_asked: true
